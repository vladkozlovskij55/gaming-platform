<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профіль</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

<header>
    <div class="logo" onclick="window.location.href='index.html'">GameStudy</div>

    <button class="burger-menu" type="button" aria-label="Open menu" aria-expanded="false" onclick="toggleBurgerMenu()">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <div class="nav-buttons">
        <button onclick="window.location.href='index.html'">Головна</button>
        <button onclick="window.location.href='lessons.html'">Уроки</button>
        <button onclick="window.location.href='test.html'">Тести</button>
        <button onclick="window.location.href='rating.html'">Рейтинг</button>
        <button class="admin-nav-button hidden" onclick="window.location.href='admin.html'">Адмін</button>
    </div>
</header>

<div class="profile-page">
    <section class="profile-dashboard-hero">
        <div class="profile-header">
            <div class="profile-avatar-big" id="profileAvatar">GS</div>
            <div class="profile-identity">
                <span class="profile-kicker">GameStudy Dashboard</span>
                <h2 id="profileName">Гравець</h2>
                <p id="profileEmail">player@gamestudy.local</p>
                <p id="profileLogin">@player</p>
            </div>
        </div>

        <div class="profile-level-card">
            <span>Рівень</span>
            <strong id="profileLevel">1</strong>
            <p id="xpText">XP: 0 / 100</p>
            <div class="xp-line">
                <div id="xpFill"></div>
            </div>
        </div>
    </section>

    <section class="profile-stats-grid">
        <div class="profile-stat-card">
            <span id="completedLessonsCount">0</span>
            <p>Пройдено уроків</p>
        </div>

        <div class="profile-stat-card">
            <span id="profileCoursesCount">0</span>
            <p>Курсів у профілі</p>
        </div>

        <div class="profile-stat-card">
            <span id="completedTestsCount">0</span>
            <p>Пройдено тестів</p>
        </div>

        <div class="profile-stat-card">
            <span id="profileResultsCount">0</span>
            <p>Результатів тестів</p>
        </div>
    </section>

    <section class="profile-dashboard-grid">
        <div class="profile-panel achievements-panel">
            <div class="profile-panel-head">
                <h3>Досягнення</h3>
            </div>
            <div id="achievements"></div>
        </div>

        <div class="profile-panel">
            <div class="profile-panel-head">
                <h3>Мої курси</h3>
            </div>
            <div id="myCoursesContainer"></div>
        </div>

        <div class="profile-panel">
            <div class="profile-panel-head">
                <h3>Мої результати</h3>
            </div>
            <div id="resultsContainer"></div>
        </div>

        <div class="profile-panel">
            <div class="profile-panel-head">
                <h3>Дані профілю</h3>
            </div>
            <div class="profile-form">
                <input type="text" id="profileNameInput" placeholder="Ім'я">
                <input type="email" id="profileEmailInput" placeholder="Email">
                <input type="url" id="profileAvatarInput" placeholder="URL аватара">
                <button onclick="saveProfile()">Зберегти профіль</button>
            </div>
        </div>
    </section>

    <div class="profile-actions">
        <button onclick="window.location.href='test.html'">Пройти тест</button>
        <button class="secondary-btn" onclick="window.location.href='rating.html'">Переглянути рейтинг</button>
        <a href="index.html">Повернутися на головну</a>
    </div>
</div>

<script src="./script.js"></script>

<script>
    let user = JSON.parse(localStorage.getItem("currentUser"));

    if (!user) {
        window.location.href = "index.html";
    }

    user.name = user.name || user.login || "Player";
    user.email = user.email || `${user.login || "player"}@gamestudy.local`;
    user.avatar = user.avatar || "";
    user.completedLessons = user.completedLessons || [];
    user.completedTests = user.completedTests || [];

    const totalScore =
        (user.cs2_score || 0) +
        (user.dota2_score || 0) +
        (user.valorant_score || 0);

    const level = Math.floor(totalScore / 100) + 1;
    const xp = totalScore % 100;

    function renderAvatar() {
        const avatar = document.getElementById("profileAvatar");
        if (user.avatar) {
            avatar.innerHTML = `<img src="${user.avatar}" alt="${user.name}">`;
        } else {
            avatar.textContent = (user.name || user.login || "GS").trim().slice(0, 2).toUpperCase();
        }
    }

    document.getElementById("profileName").innerText = user.name;
    document.getElementById("profileEmail").innerText = user.email;
    document.getElementById("profileLogin").innerText = "@" + user.login;
    document.getElementById("profileLevel").innerText = level;
    document.getElementById("completedLessonsCount").innerText = user.completedLessons.length;
    document.getElementById("completedTestsCount").innerText = user.completedTests.length;
    document.getElementById("profileCoursesCount").innerText = (user.myCourses || []).length;
    document.getElementById("profileResultsCount").innerText =
        [user.cs2_score, user.dota2_score, user.valorant_score].filter(score => Number(score) > 0).length;
    document.getElementById("profileNameInput").value = user.name;
    document.getElementById("profileEmailInput").value = user.email;
    document.getElementById("profileAvatarInput").value = user.avatar;
    document.getElementById("xpText").innerText = "XP: " + xp + " / 100";
    document.getElementById("xpFill").style.width = xp + "%";
    renderAvatar();

    const completedCoursesCount = Math.max((user.myCourses || []).length, user.completedLessons.length);
    const completedTestsCount = user.completedTests.length;
    const passedTestResults = [user.cs2_score, user.dota2_score, user.valorant_score]
        .filter(score => Number(score) > 0).length;
    const achievementList = [
        {
            icon: "🎮",
            title: "Перший курс",
            description: "Почати перший навчальний курс",
            unlocked: completedCoursesCount >= 1
        },
        {
            icon: "🧠",
            title: "Перший тест",
            description: "Пройти будь-який тест",
            unlocked: completedTestsCount >= 1 || passedTestResults >= 1
        },
        {
            icon: "⚡",
            title: "50 балів",
            description: "Набрати 50 загальних балів",
            unlocked: totalScore >= 50
        },
        {
            icon: "🏆",
            title: "100 балів",
            description: "Набрати 100 загальних балів",
            unlocked: totalScore >= 100
        },
        {
            icon: "📚",
            title: "3 курси",
            description: "Завершити або додати 3 курси",
            unlocked: completedCoursesCount >= 3
        },
        {
            icon: "✅",
            title: "Усі тести пройдені",
            description: "Мати результати з CS2, Dota 2 і Valorant",
            unlocked: passedTestResults >= 3
        },
        {
            icon: "🎯",
            title: "CS2 старт",
            description: "Отримати результат у CS2",
            unlocked: Number(user.cs2_score) > 0
        },
        {
            icon: "🛡️",
            title: "Dota 2 старт",
            description: "Отримати результат у Dota 2",
            unlocked: Number(user.dota2_score) > 0
        },
        {
            icon: "🔫",
            title: "Valorant старт",
            description: "Отримати результат у Valorant",
            unlocked: Number(user.valorant_score) > 0
        },
        {
            icon: "💎",
            title: "Елітний гравець",
            description: "Досягти 200 загальних балів",
            unlocked: totalScore >= 200
        }
    ];

    document.getElementById("achievements").innerHTML = achievementList.map(achievement => `
        <div class="achievement-card ${achievement.unlocked ? "unlocked" : "locked"}">
            <span class="achievement-icon">${achievement.icon}</span>
            <div class="achievement-info">
                <h4>${achievement.title}</h4>
                <p>${achievement.description}</p>
                <strong>${achievement.unlocked ? "Відкрито" : "Заблоковано"}</strong>
            </div>
        </div>
    `).join("");

    function saveProfile() {
        user.name = document.getElementById("profileNameInput").value.trim() || user.name;
        user.email = document.getElementById("profileEmailInput").value.trim() || user.email;
        user.avatar = document.getElementById("profileAvatarInput").value.trim();

        let users = JSON.parse(localStorage.getItem("users")) || [];
        let userIndex = users.findIndex(item => item.login === user.login);

        if (userIndex !== -1) {
            users[userIndex] = user;
        } else {
            users.push(user);
        }

        localStorage.setItem("users", JSON.stringify(users));
        localStorage.setItem("currentUser", JSON.stringify(user));

        document.getElementById("profileName").innerText = user.name;
        document.getElementById("profileEmail").innerText = user.email;
        renderAvatar();
        alert("Профиль сохранён");
    }

    function logout() {
        localStorage.removeItem("currentUser");
        localStorage.removeItem("token");
        window.location.href = "index.html";
    }
</script>

</body>
</html>
