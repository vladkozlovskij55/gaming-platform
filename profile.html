<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профіль</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

<header>
    <div class="logo" onclick="window.location.href='index.html'">GameStudy</div>

    <div class="nav-buttons">
        <button onclick="window.location.href='index.html'">Головна</button>
        <button onclick="window.location.href='lessons.html'">Уроки</button>
        <button onclick="window.location.href='test.html'">Тести</button>
        <button onclick="window.location.href='rating.html'">Рейтинг</button>
        <button class="logout" onclick="logout()">Вийти</button>
    </div>
</header>

<div class="box profile-page">
    <h2>Особистий кабінет</h2>

    <div class="profile-header">
        <div class="profile-avatar-big">🎮</div>
        <div>
            <h3 id="profileLogin">Гравець</h3>
            <p id="profileLevel">Рівень 1</p>
        </div>
    </div>

    <div class="xp-box">
        <p id="xpText">XP: 0 / 100</p>
        <div class="xp-line">
            <div id="xpFill"></div>
        </div>
    </div>

    <h3>Досягнення</h3>
    <div id="achievements"></div>

    <h3>Мої курси</h3>
    <div id="myCoursesContainer"></div>

    <h3>Мої результати</h3>
    <div id="resultsContainer"></div>

    <div class="nav-buttons" style="margin-top: 18px;">
        <button onclick="window.location.href='test.html'">Пройти тест</button>
        <button onclick="window.location.href='rating.html'">Переглянути рейтинг</button>
    </div>

    <p style="margin-top: 20px;">
        <a href="index.html">Повернутися на головну</a>
    </p>
</div>

<script src="./script.js"></script>

<script>
    const user = JSON.parse(localStorage.getItem("currentUser"));

    if (!user) {
        window.location.href = "index.html";
    }

    const totalScore =
        (user.cs2_score || 0) +
        (user.dota2_score || 0) +
        (user.valorant_score || 0);

    const level = Math.floor(totalScore / 100) + 1;
    const xp = totalScore % 100;

    document.getElementById("profileLogin").innerText = user.login;
    document.getElementById("profileLevel").innerText = "Рівень " + level;
    document.getElementById("xpText").innerText = "XP: " + xp + " / 100";
    document.getElementById("xpFill").style.width = xp + "%";

    const achievements = [];

    if (totalScore >= 10) achievements.push("🧠 Перший тест");
    if (totalScore >= 20) achievements.push("🔥 Активний гравець");
    if (totalScore >= 50) achievements.push("🏆 Сильний результат");

    if (achievements.length === 0) {
        achievements.push("Поки немає досягнень");
    }

    document.getElementById("achievements").innerHTML =
        achievements.map(a => `<div class="achievement-card">${a}</div>`).join("");

    function logout() {
        localStorage.removeItem("currentUser");
        localStorage.removeItem("token");
        window.location.href = "index.html";
    }
</script>

</body>
</html>
