<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рейтинг</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo" onclick="window.location.href='index.html'">GameStudy</div>

    <button class="burger-menu" type="button" aria-label="Open menu" aria-expanded="false" onclick="toggleBurgerMenu()">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <div class="nav-buttons">
        <button onclick="window.location.href='index.html'">Головна</button>
        <button onclick="window.location.href='lessons.html'">Уроки</button>
        <button onclick="window.location.href='test.html'">Тести</button>
        <button onclick="window.location.href='profile.html'">Профіль</button>
    </div>
</header>

<main class="rating-page">
    <section class="rating-hero">
        <div>
            <span class="profile-kicker">GameStudy Leaderboard</span>
            <h1>Рейтинг гравців</h1>
            <p>Топ користувачів за результатами тестів CS2, Dota 2 та Valorant.</p>
        </div>
        <div class="rating-hero-score">
            <span>Total</span>
            <strong id="playersCount">0</strong>
            <p>гравців</p>
        </div>
    </section>

    <section id="topPlayers" class="top-players-grid"></section>

    <section class="leaderboard-table-panel">
        <div class="profile-panel-head">
            <h2>Усі гравці</h2>
        </div>
        <div id="leaderboard"></div>
    </section>

    <p class="test-back-link"><a href="index.html">Повернутися на головну</a></p>
</main>

<script>
    let users = JSON.parse(localStorage.getItem("users")) || [];

    users.forEach(user => {
        user.totalScore =
            (user.cs2_score || 0) +
            (user.dota2_score || 0) +
            (user.valorant_score || 0);
    });

    users.sort((a, b) => b.totalScore - a.totalScore);

    document.getElementById("playersCount").innerText = users.length;

    if (users.length === 0) {
        document.getElementById("topPlayers").innerHTML =
            "<p class='muted-text empty-leaderboard'>Поки що немає гравців у рейтингу</p>";
        document.getElementById("leaderboard").innerHTML = "";
    } else {
        const rankClasses = ["gold", "silver", "bronze"];
        const medals = ["🥇", "🥈", "🥉"];
        const topUsers = users.slice(0, 3);

        document.getElementById("topPlayers").innerHTML = topUsers.map((user, index) => `
            <article class="top-player-card ${rankClasses[index]}">
                <span class="top-player-rank">${medals[index]} #${index + 1}</span>
                <h2>${user.login || "player"}</h2>
                <strong>${user.totalScore}</strong>
                <div class="top-player-scores">
                    <span>CS2 ${user.cs2_score || 0}</span>
                    <span>Dota 2 ${user.dota2_score || 0}</span>
                    <span>Valorant ${user.valorant_score || 0}</span>
                </div>
            </article>
        `).join("");

        document.getElementById("leaderboard").innerHTML = `
            <div class="leaderboard-table">
                <div class="leaderboard-row leaderboard-head">
                    <span>Місце</span>
                    <span>Логін</span>
                    <span>CS2</span>
                    <span>Dota 2</span>
                    <span>Valorant</span>
                    <span>Загальний бал</span>
                </div>
                ${users.map((user, index) => `
                    <div class="leaderboard-row">
                        <span class="leaderboard-rank" data-label="Місце">${medals[index] || "🎮"} #${index + 1}</span>
                        <span class="leaderboard-login" data-label="Логін">${user.login || "player"}</span>
                        <span data-label="CS2">${user.cs2_score || 0}</span>
                        <span data-label="Dota 2">${user.dota2_score || 0}</span>
                        <span data-label="Valorant">${user.valorant_score || 0}</span>
                        <span class="leaderboard-total" data-label="Загальний бал">${user.totalScore}</span>
                    </div>
                `).join("")}
            </div>
        `;
    }
</script>
<script src="./script.js"></script>

</body>
</html>
