<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рейтинг</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo" onclick="window.location.href='index.html'">GameStudy</div>

    <div class="nav-buttons">
        <button onclick="window.location.href='index.html'">Головна</button>
        <button onclick="window.location.href='lessons.html'">Уроки</button>
        <button onclick="window.location.href='test.html'">Тести</button>
        <button onclick="window.location.href='profile.html'">Профіль</button>
    </div>
</header>

<div class="box leaderboard-box">
    <h2>🏆 Рейтинг гравців</h2>
    <p class="muted-text">Топ користувачів за результатами тестів</p>

    <div id="leaderboard"></div>

    <p><a href="index.html">Повернутися на головну</a></p>
</div>

<script>
    let users = JSON.parse(localStorage.getItem("users")) || [];

    users.forEach(user => {
        user.totalScore =
            (user.cs2_score || 0) +
            (user.dota2_score || 0) +
            (user.valorant_score || 0);
    });

    users.sort((a, b) => b.totalScore - a.totalScore);

    let html = "";

    if (users.length === 0) {
        html = "<p class='muted-text'>Поки що немає гравців у рейтингу</p>";
    } else {
        users.forEach((user, index) => {
            let medal = index === 0 ? "🥇" : index === 1 ? "🥈" : index === 2 ? "🥉" : "🎮";

            html += `
                <div class="leaderboard-item">
                    <div class="leaderboard-place">${medal}</div>

                    <div class="leaderboard-info">
                        <h3>${user.login}</h3>
                        <p>CS2: ${user.cs2_score || 0} | Dota 2: ${user.dota2_score || 0} | Valorant: ${user.valorant_score || 0}</p>
                    </div>

                    <div class="leaderboard-score">${user.totalScore}</div>
                </div>
            `;
        });
    }

    document.getElementById("leaderboard").innerHTML = html;
</script>

</body>
</html>
