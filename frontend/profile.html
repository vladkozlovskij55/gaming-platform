<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профіль</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo" onclick="window.location.href='index.html'">GameStudy</div>

    <div class="nav-buttons">
        <button onclick="window.location.href='lessons.html'">Уроки</button>
        <button onclick="window.location.href='test.html'">Тести</button>
        <button onclick="window.location.href='profile.html'">Профіль</button>
        <button onclick="window.location.href='rating.html'">Рейтинг</button>
        <button onclick="openLoginModal()">Вхід</button>
        <button onclick="openRegisterModal()">Реєстрація</button>
        <button onclick="window.location.href='admin.html'">Адмін</button>
    </div>
</header>

<div class="box">
    <h2>Особистий кабінет</h2>
    <h2>Мої курси</h2>
<div id="myCoursesContainer"></div>
<h2>Мої результати</h2>
<div id="resultsContainer"></div>
    <p id="userLogin"></p>
    <p id="scores"></p>

    <h3>Мої курси</h3>
    <div id="myCourses"></div>

    <div class="nav-buttons" style="margin-top: 18px;">
        <button onclick="window.location.href='test.html'">Пройти тест</button>
        <button onclick="window.location.href='rating.html'">Переглянути рейтинг</button>
        <button class="logout" onclick="logout()">Вийти</button>
    </div>

    <p style="margin-top: 20px;"><a href="index.html">Повернутися на головну</a></p>
</div>

<script>
    let user = JSON.parse(localStorage.getItem("currentUser"));

    if (!user) {
        window.location.href = "login.html";
    } else {
        document.getElementById("userLogin").innerText = "Ваш логін: " + user.login;
    }

    document.getElementById("scores").innerText =
        "CS2: " + (user.cs2_score ?? 0) +
        " | Dota 2: " + (user.dota2_score ?? 0) +
        " | Valorant: " + (user.valorant_score ?? 0);

    let container = document.getElementById("myCourses");

    if (user.myCourses && user.myCourses.length > 0) {
        let html = '<div class="my-courses">';

        user.myCourses.forEach(course => {
            html += `
                <div class="my-card">
                    <h4>${course}</h4>
                    <button class="delete" onclick="removeCourse('${course}')">Видалити</button>
                </div>
            `;
        });

        html += '</div>';
        container.innerHTML = html;
    } else {
        container.innerHTML = "<p style='color:#c6d0f5;'>Ви ще не записалися на курси</p>";
    }

    function removeCourse(courseName) {
        let users = JSON.parse(localStorage.getItem("users")) || [];
        let currentUser = JSON.parse(localStorage.getItem("currentUser"));

        if (!currentUser.myCourses) {
            currentUser.myCourses = [];
        }

        currentUser.myCourses = currentUser.myCourses.filter(c => c !== courseName);

        let index = users.findIndex(u => u.login === currentUser.login);

        if (index !== -1) {
            users[index] = currentUser;
        }

        localStorage.setItem("users", JSON.stringify(users));
        localStorage.setItem("currentUser", JSON.stringify(currentUser));

        location.reload();
    }

    function logout() {
        localStorage.removeItem("currentUser");
        window.location.href = "login.html";
    }
</script>

</body>
</html>
