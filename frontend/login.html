<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo" onclick="window.location.href='index.html'">GameStudy</div>

    <div class="nav-buttons">
        <button onclick="window.location.href='lessons.html'">Уроки</button>
        <button onclick="window.location.href='test.html'">Тести</button>
        <button onclick="window.location.href='profile.html'">Профіль</button>
        <button onclick="window.location.href='rating.html'">Рейтинг</button>
        <button onclick="openLoginModal()">Вхід</button>
        <button onclick="openRegisterModal()">Реєстрація</button>
        <button onclick="window.location.href='admin.html'">Адмін</button>
    </div>
</header>

<div class="box">
    <h2>Вхід до акаунта</h2>
    <p style="color:#c6d0f5;">Увійдіть, щоб проходити курси, тести та відстежувати прогрес.</p>

    <input type="text" id="login" placeholder="Логін">
    <input type="password" id="password" placeholder="Пароль">

    <button onclick="loginUser()">Увійти</button>

    <p><a href="index.html">Повернутися на головну</a></p>
</div>

<script>
function loginUser() {
    let login = document.getElementById("login").value;
    let password = document.getElementById("password").value;

    let users = JSON.parse(localStorage.getItem("users")) || [];

    let foundUser = users.find(user =>
        user.login === login && user.password === password
    );

    if (foundUser) {
        localStorage.setItem("currentUser", JSON.stringify(foundUser));
        alert("Вхід успішний!");
        window.location.href = "profile.html";
    } else {
        alert("Невірний логін або пароль");
    }
}
</script>

</body>
</html>
