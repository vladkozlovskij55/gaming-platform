<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тести</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo" onclick="window.location.href='index.html'">GameStudy</div>
    <button class="burger-menu" type="button" aria-label="Open menu" aria-expanded="false" onclick="toggleBurgerMenu()">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <div class="nav-buttons">
        <button onclick="window.location.href='lessons.html'">Уроки</button>
        <button onclick="window.location.href='test.html'">Тести</button>
        <button onclick="window.location.href='profile.html'">Профіль</button>
        <button onclick="window.location.href='rating.html'">Рейтинг</button>
        <button onclick="window.location.href='login.html'">Вхід</button>
        <button onclick="window.location.href='register.html'">Реєстрація</button>
        <button class="admin-nav-button hidden" onclick="window.location.href='admin.html'">Адмін</button>
    </div>
</header>
<main class="test-page">
    <section class="test-hero">
        <div>
            <span class="profile-kicker">GameStudy Arena</span>
            <h1>Оберіть тест</h1>
            <p>Перевірте навички, прокачайте рейтинг і збережіть результат у профілі.</p>
        </div>
        <div class="test-hero-score">
            <span>Mode</span>
            <strong>Quiz</strong>
        </div>
    </section>

    <section class="game-select-grid">
        <button class="game-select-card cs2-card" onclick="startTest('cs2')">
            <span>CS2</span>
            <strong>Aim & positioning</strong>
        </button>
        <button class="game-select-card dota-card" onclick="startTest('dota2')">
            <span>Dota 2</span>
            <strong>Teamplay & tactics</strong>
        </button>
        <button class="game-select-card valorant-card" onclick="startTest('valorant')">
            <span>Valorant</span>
            <strong>Agents & map control</strong>
        </button>
    </section>

    <section id="testBlock" class="test-panel hidden">
        <div class="test-panel-head">
            <div>
                <span id="questionCounter">Питання 1 з 10</span>
                <h2 id="testTitle"></h2>
            </div>
            <span id="scorePreview">0 XP</span>
        </div>

        <div class="test-progress">
            <div id="testProgressFill"></div>
        </div>

        <div id="questions"></div>
        <div id="result"></div>

        <div id="resultActions" class="test-result-actions hidden">
            <button onclick="window.location.href='index.html'">На головну</button>
            <button class="secondary-btn" onclick="window.location.href='profile.html'">У профіль</button>
        </div>
    </section>

    <p class="test-back-link"><a href="profile.html">Назад у профіль</a></p>
</main>

<script src="./script.js"></script>
<script>
    let questions = [];
    let currentQuestion = 0;
    let score = 0;
    let currentTestType = "";
    const gameNames = {
        cs2: "CS2",
        dota2: "Dota 2",
        valorant: "Valorant"
    };

    function startTest(type) {
        currentTestType = type;
        currentQuestion = 0;
        score = 0;

        if (type === "cs2") {
            questions = [
                { q: "Що найбільше покращує aim?", a: ["Практика", "Удача"], correct: 0 },
                { q: "Що важливо для точної стрільби?", a: ["Реакція", "Випадковість"], correct: 0 },
                { q: "Що допомагає краще контролювати зброю?", a: ["Контроль віддачі", "Гучність звуку"], correct: 0 },
                { q: "Що потрібно робити для розвитку навички стрільби?", a: ["Регулярно тренуватись", "Лише дивитися відео"], correct: 0 },
                { q: "Що впливає на успішний постріл у CS2?", a: ["Позиціонування", "Колір карти"], correct: 0 },
                { q: "Що корисно для тренування aim?", a: ["Тренувальні карти", "Випадкові налаштування"], correct: 0 },
                { q: "Що потрібно робити під час стрільби?", a: ["Контролювати приціл", "Не дивитися на екран"], correct: 0 },
                { q: "Що важливіше для покращення гри?", a: ["Аналіз помилок", "Тільки новий скін"], correct: 0 },
                { q: "Що покращує виживання у грі?", a: ["Швидка реакція", "Випадковий рух"], correct: 0 },
                { q: "Яка навичка є ключовою у CS2?", a: ["Точність", "Удача"], correct: 0 }
            ];
            document.getElementById("testTitle").innerText = "CS2 Тест";
        }

        if (type === "dota2") {
            questions = [
                { q: "Що важливо в Dota 2?", a: ["Командна гра", "Лише удача"], correct: 0 },
                { q: "Що потрібно для розвитку героя?", a: ["Фарм", "Випадковий рух"], correct: 0 },
                { q: "Що означає роль героя?", a: ["Його завдання в команді", "Його колір"], correct: 0 },
                { q: "Що допомагає виграти карту?", a: ["Контроль об'єктів", "Тільки швидкість миші"], correct: 0 },
                { q: "Що важливо під час лінії?", a: ["Добивання крипів", "Ігнорування фарму"], correct: 0 },
                { q: "Що впливає на успіх команди?", a: ["Комунікація", "Тільки випадок"], correct: 0 },
                { q: "Що потрібно для сильного пізнього етапу гри?", a: ["Предмети та досвід", "Лише один герой"], correct: 0 },
                { q: "Яка дія корисна для підтримки союзників?", a: ["Допомога на лініях", "Ігнорування команди"], correct: 0 },
                { q: "Що потрібно робити на карті?", a: ["Слідкувати за ситуацією", "Не дивитися на мінікарту"], correct: 0 },
                { q: "Що є основою перемоги в Dota 2?", a: ["Тактика та взаємодія", "Удача"], correct: 0 }
            ];
            document.getElementById("testTitle").innerText = "Dota 2 Тест";
        }

        if (type === "valorant") {
            questions = [
                { q: "Що важливо у Valorant?", a: ["Позиціонування", "Випадковість"], correct: 0 },
                { q: "Що допомагає перемозі?", a: ["Командна гра", "Соло без плану"], correct: 0 },
                { q: "Що потрібно перевіряти під час руху?", a: ["Кути", "Лише небо"], correct: 0 },
                { q: "Що важливо в агентів?", a: ["Правильне використання здібностей", "Лише зовнішній вигляд"], correct: 0 },
                { q: "Що допомагає утримувати точку?", a: ["Тактика", "Випадкові дії"], correct: 0 },
                { q: "Що важливо при атаці?", a: ["Комунікація", "Мовчання"], correct: 0 },
                { q: "Що впливає на результат раунду?", a: ["Контроль карти", "Тільки випадок"], correct: 0 },
                { q: "Що потрібно для кращої оборони?", a: ["Займати правильні позиції", "Стояти без руху"], correct: 0 },
                { q: "Що робити перед входом на сайт?", a: ["Узгодити дії з командою", "Йти по одному"], correct: 0 },
                { q: "Що є основою успіху у Valorant?", a: ["Тактика та координація", "Удача"], correct: 0 }
            ];
            document.getElementById("testTitle").innerText = "Valorant Тест";
        }

        document.getElementById("result").innerHTML = "";
        document.getElementById("scorePreview").innerText = "0 XP";
        document.getElementById("resultActions").classList.add("hidden");
        document.getElementById("testBlock").classList.remove("hidden");

        showQuestion();
    }

    function showQuestion() {
        let q = questions[currentQuestion];

        document.getElementById("questionCounter").innerText =
            "Питання " + (currentQuestion + 1) + " з " + questions.length;
        document.getElementById("scorePreview").innerText = score + " / " + questions.length;
        document.getElementById("testProgressFill").style.width =
            Math.round((currentQuestion / questions.length) * 100) + "%";

        document.getElementById("questions").innerHTML = `
            <article class="question-card">
                <p>${q.q}</p>
                <div class="answer-grid">
                    <button class="answer-btn" onclick="answer(0)">${q.a[0]}</button>
                    <button class="answer-btn" onclick="answer(1)">${q.a[1]}</button>
                </div>
            </article>
        `;
    }

    function answer(index) {
        if (index === questions[currentQuestion].correct) {
            score++;
        }

        currentQuestion++;

        if (currentQuestion < questions.length) {
            showQuestion();
        } else {
            finishTest();
        }
    }

    function finishTest() {
        const percent = Math.round((score / questions.length) * 100);

        document.getElementById("questionCounter").innerText = "";
        document.getElementById("questions").innerHTML = "";
        document.getElementById("testProgressFill").style.width = "100%";
        document.getElementById("scorePreview").innerText = percent + "%";
        document.getElementById("result").innerHTML = `
            <div class="test-result-card">
                <span>Тест завершено</span>
                <h3>${gameNames[currentTestType]}</h3>
                <div class="test-result-stats">
                    <div>
                        <strong>${score} / ${questions.length}</strong>
                        <p>правильних відповідей</p>
                    </div>
                    <div>
                        <strong>${percent}%</strong>
                        <p>результат</p>
                    </div>
                </div>
            </div>
        `;

        document.getElementById("resultActions").classList.remove("hidden");

        let currentUser = JSON.parse(localStorage.getItem("currentUser"));
        let users = JSON.parse(localStorage.getItem("users")) || [];

        if (!currentUser) {
            if (typeof saveResult === "function") {
                saveResult(currentTestType, score);
            }
            return;
        }

        if (currentTestType === "cs2") {
            currentUser.cs2_score = score;
        }

        if (currentTestType === "dota2") {
            currentUser.dota2_score = score;
        }

        if (currentTestType === "valorant") {
            currentUser.valorant_score = score;
        }

        currentUser.completedTests = currentUser.completedTests || [];
        if (!currentUser.completedTests.includes(currentTestType)) {
            currentUser.completedTests.push(currentTestType);
        }

        let userIndex = users.findIndex(user => user.login === currentUser.login);

        if (userIndex !== -1) {
            users[userIndex] = currentUser;
        }

        localStorage.setItem("users", JSON.stringify(users));
        localStorage.setItem("currentUser", JSON.stringify(currentUser));

        if (typeof saveResult === "function") {
            saveResult(currentTestType, score);
        }
    }
</script>

</body>
</html>
