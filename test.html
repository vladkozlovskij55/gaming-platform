                { q: "Що означає reset лінії?", a: ["Повернути хвилю в нейтральний стан", "Стояти AFK"], correct: 0 },
                { q: "Що допомагає перемагати командні бої?", a: ["Координація і фокус цілі", "Кожен грає окремо"], correct: 0 }
            ];
            document.getElementById("testTitle").innerText = "League of Legends Тест";
        }
        questions = [...questions, ...(extraQuestions[type] || [])];
        document.getElementById("result").innerHTML = "";
        document.getElementById("scorePreview").innerText = "0 XP";
        document.getElementById("resultActions").classList.add("hidden");
        document.getElementById("testBlock").classList.remove("hidden");

        showQuestion();
    }

    function showQuestion() {
        let q = questions[currentQuestion];

        document.getElementById("questionCounter").innerText =
            "РџРёС‚Р°РЅРЅСЏ " + (currentQuestion + 1) + " Р· " + questions.length;
        document.getElementById("scorePreview").innerText = score + " / " + questions.length;
        document.getElementById("testProgressFill").style.width =
            Math.round((currentQuestion / questions.length) * 100) + "%";

        document.getElementById("questions").innerHTML = `
            <article class="question-card">
                <p>${q.q}</p>
                <div class="answer-grid">
                    <button class="answer-btn" onclick="answer(0)">${q.a[0]}</button>
                    <button class="answer-btn" onclick="answer(1)">${q.a[1]}</button>
                </div>
            </article>
        `;
    }

    function answer(index) {
        if (index === questions[currentQuestion].correct) {
            score++;
        }

        currentQuestion++;

        if (currentQuestion < questions.length) {
            showQuestion();
        } else {
            finishTest();
        }
    }

    function finishTest() {
        const percent = Math.round((score / questions.length) * 100);

        document.getElementById("questionCounter").innerText = "";
        document.getElementById("questions").innerHTML = "";
        document.getElementById("testProgressFill").style.width = "100%";
        document.getElementById("scorePreview").innerText = percent + "%";
        document.getElementById("result").innerHTML = `
            <div class="test-result-card">
                <span>РўРµСЃС‚ Р·Р°РІРµСЂС€РµРЅРѕ</span>
                <h3>${gameNames[currentTestType]}</h3>
                <div class="test-result-stats">
                    <div>
                        <strong>${score} / ${questions.length}</strong>
                        <p>РїСЂР°РІРёР»СЊРЅРёС… РІС–РґРїРѕРІС–РґРµР№</p>
                    </div>
                    <div>
                        <strong>${percent}%</strong>
                        <p>СЂРµР·СѓР»СЊС‚Р°С‚</p>
                    </div>
                </div>
            </div>
        `;

        document.getElementById("resultActions").classList.remove("hidden");

        let currentUser = JSON.parse(localStorage.getItem("currentUser"));
        let users = JSON.parse(localStorage.getItem("users")) || [];

        if (!currentUser) {
            if (typeof saveResult === "function") {
                saveResult(currentTestType, score);
            }
            return;
        }

        if (currentTestType === "cs2") {
            currentUser.cs2_score = score;
        }

        if (currentTestType === "dota2") {
            currentUser.dota2_score = score;
        }

        if (currentTestType === "valorant") {
            currentUser.valorant_score = score;
        }

        if (currentTestType === "lol") {
            currentUser.lol_score = score;
        }

        currentUser.completedTests = currentUser.completedTests || [];
        if (!currentUser.completedTests.includes(currentTestType)) {
            currentUser.completedTests.push(currentTestType);
        }

        let userIndex = users.findIndex(user => user.login === currentUser.login);

        if (userIndex !== -1) {
            users[userIndex] = currentUser;
        } else {
            users.push(currentUser);
        }

        localStorage.setItem("users", JSON.stringify(users));
        localStorage.setItem("currentUser", JSON.stringify(currentUser));

        if (typeof saveResult === "function") {
            saveResult(currentTestType, score);
        }
    }
</script>

</html>
