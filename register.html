<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo" onclick="window.location.href='index.html'">🎮 GameStudy | Головна</div>

    <div class="nav-buttons">
        <button onclick="window.location.href='lessons.html'">Уроки</button>
        <button onclick="window.location.href='test.html'">Тести</button>
        <button onclick="window.location.href='profile.html'">Профіль</button>
        <button onclick="window.location.href='rating.html'">Рейтинг</button>
        <button onclick="openLoginModal()">Вхід</button>
        <button onclick="openRegisterModal()">Реєстрація</button>
        <button class="admin-nav-button hidden" onclick="window.location.href='admin.html'">Адмін</button>
    </div>
</header>
<div class="box">
    <h2>Створення акаунта</h2>
    <p style="color:#c6d0f5;">Зареєструйтеся, щоб отримати доступ до курсів, тестів і особистого кабінету.</p>

    <input type="text" id="name" placeholder="Имя">
    <input type="email" id="email" placeholder="Email">
    <input type="url" id="avatar" placeholder="URL аватара (необязательно)">
    <input type="text" id="login" placeholder="Логін">
    <input type="password" id="password" placeholder="Пароль">

    <button onclick="registerUser()">Зареєструватися</button>

    <p><a href="index.html">Повернутися на головну</a></p>
</div>

<script>
function registerUser() {
    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let avatar = document.getElementById("avatar").value.trim();
    let login = document.getElementById("login").value;
    let password = document.getElementById("password").value;

    if (name === "" || email === "" || login === "" || password === "") {
        alert("Заповніть всі поля");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    let exists = users.find(user => user.login === login);

    if (exists) {
        alert("Такий користувач вже існує");
        return;
    }

    let newUser = {
        name: name,
        email: email,
        avatar: avatar,
        login: login,
        password: password,
        role: login === "admin" ? "admin" : "user",
        cs2_score: 0,
        dota2_score: 0,
        valorant_score: 0,
        completedLessons: [],
        completedTests: [],
        myCourses: []
    };

    users.push(newUser);

    localStorage.setItem("users", JSON.stringify(users));

    alert("Реєстрація успішна!");
    window.location.href = "login.html";
}
</script>

</body>
</html>
