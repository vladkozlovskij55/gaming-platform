<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адмін панель</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo" onclick="window.location.href='index.html'">GameStudy</div>

    <div class="nav-buttons">
        <button onclick="window.location.href='lessons.html'">Уроки</button>
        <button onclick="window.location.href='test.html'">Тести</button>
        <button onclick="window.location.href='profile.html'">Профіль</button>
        <button onclick="window.location.href='rating.html'">Рейтинг</button>
        <button onclick="openLoginModal()">Вхід</button>
        <button onclick="openRegisterModal()">Реєстрація</button>
        <button onclick="window.location.href='admin.html'">Адмін</button>
    </div>
</header>

<main class="admin-page">
    <section class="admin-hero">
        <div>
            <span class="profile-kicker">GameStudy Control Center</span>
            <h1>Адмін панель</h1>
            <p>Керуйте курсами платформи: додавайте, редагуйте та видаляйте контент.</p>
        </div>
        <div class="admin-hero-card">
            <span>Status</span>
            <strong>Admin</strong>
            <p>dashboard mode</p>
        </div>
    </section>

    <section class="admin-stats-grid">
        <div class="admin-stat-card">
            <span id="adminCoursesCount">0</span>
            <p>Курсів</p>
        </div>
        <div class="admin-stat-card">
            <span id="adminUsersCount">0</span>
            <p>Користувачів</p>
        </div>
        <div class="admin-stat-card">
            <span id="adminResultsCount">0</span>
            <p>Результатів тестів</p>
        </div>
    </section>

    <section class="admin-dashboard-grid">
        <form class="admin-form-panel" onsubmit="addCourse(); return false;">
            <div class="profile-panel-head">
                <h2 id="adminFormTitle">Додати курс</h2>
            </div>

            <label for="courseName">Назва курсу</label>
            <input type="text" id="courseName" placeholder="Наприклад: CS2 Aim">

            <label for="courseDescription">Опис курсу</label>
            <textarea id="courseDescription" placeholder="Короткий опис курсу"></textarea>

            <label for="courseImage">Зображення курсу</label>
            <input type="url" id="courseImage" placeholder="https://...">

            <p id="adminFormError" class="form-error hidden">Заповніть назву та опис курсу</p>
            <button id="adminSubmitBtn" type="submit">Додати курс</button>
        </form>

        <section class="admin-courses-panel">
            <div class="profile-panel-head">
                <h2>Список курсів</h2>
            </div>
            <div id="courseList" class="admin-course-list"></div>
        </section>
    </section>

    <p class="test-back-link"><a href="index.html">Повернутися на головну</a></p>
</main>

<script>
    let currentUser = JSON.parse(localStorage.getItem("currentUser"));

    if (!currentUser || currentUser.role !== "admin") {
        alert("Доступ заборонено");
        window.location.href = "index.html";
    }

    let courses = JSON.parse(localStorage.getItem("courses")) || [
        {
            name: "CS2 Aim",
            description: "Покращення точності стрільби та реакції",
            image: "https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=900&q=80"
        },
        {
            name: "Dota 2 Basics",
            description: "Ролі героїв, фарм і командна взаємодія",
            image: "https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&w=900&q=80"
        },
        {
            name: "Valorant Tactics",
            description: "Позиціонування, комунікація та контроль карти",
            image: "https://images.unsplash.com/photo-1542751110-97427bbecf20?auto=format&fit=crop&w=900&q=80"
        }
    ];

    let editIndex = -1;
    const defaultCourseImage = "https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=900&q=80";

    function getStoredUsersCount() {
        return (JSON.parse(localStorage.getItem("users")) || []).length;
    }

    function getStoredResultsCount() {
        const users = JSON.parse(localStorage.getItem("users")) || [];
        const parsedResults = JSON.parse(localStorage.getItem("results")) || [];
        const storedResults = Array.isArray(parsedResults) ? parsedResults : [];
        const scoreResults = users.reduce((total, user) => {
            return total + [user.cs2_score, user.dota2_score, user.valorant_score]
                .filter(score => Number(score) > 0).length;
        }, 0);

        return Math.max(storedResults.length, scoreResults);
    }

    function updateAdminStats() {
        document.getElementById("adminCoursesCount").innerText = courses.length;
        document.getElementById("adminUsersCount").innerText = getStoredUsersCount();
        document.getElementById("adminResultsCount").innerText = getStoredResultsCount();
    }

    function renderCourses() {
        document.getElementById("courseList").innerHTML = courses.length ? courses.map((course, index) => `
            <article class="admin-course-card">
                <img src="${course.image || defaultCourseImage}" alt="${course.name}">
                <div>
                    <span>Course #${index + 1}</span>
                    <h3>${course.name}</h3>
                    <p>${course.description}</p>
                </div>
                <div class="admin-card-actions">
                    <button onclick="editCourse(${index})">Редагувати</button>
                    <button class="delete" onclick="deleteCourse(${index})">Видалити</button>
                </div>
            </article>
        `).join("") : "<p class='muted-text empty-leaderboard'>Курсів поки що немає</p>";
        updateAdminStats();
    }

    function addCourse() {
        let name = document.getElementById("courseName").value.trim();
        let description = document.getElementById("courseDescription").value.trim();
        let image = document.getElementById("courseImage").value.trim() || defaultCourseImage;
        let error = document.getElementById("adminFormError");

        if (name === "" || description === "") {
            error.classList.remove("hidden");
            return;
        }

        error.classList.add("hidden");

        if (editIndex === -1) {
            courses.push({ name, description, image });
            alert("Курс додано!");
        } else {
            courses[editIndex] = { name, description, image };
            alert("Курс оновлено!");
            editIndex = -1;
            document.getElementById("adminFormTitle").innerText = "Додати курс";
            document.getElementById("adminSubmitBtn").innerText = "Додати курс";
        }

        saveCourses();
        renderCourses();

        document.getElementById("courseName").value = "";
        document.getElementById("courseDescription").value = "";
        document.getElementById("courseImage").value = "";
    }

    function editCourse(index) {
        document.getElementById("courseName").value = courses[index].name;
        document.getElementById("courseDescription").value = courses[index].description;
        document.getElementById("courseImage").value = courses[index].image;
        editIndex = index;
        document.getElementById("adminFormTitle").innerText = "Редагувати курс";
        document.getElementById("adminSubmitBtn").innerText = "Зберегти зміни";
        document.getElementById("adminFormError").classList.add("hidden");
        document.querySelector(".admin-form-panel").scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function deleteCourse(index) {
        courses.splice(index, 1);
        saveCourses();
        renderCourses();
    }

    function saveCourses() {
        localStorage.setItem("courses", JSON.stringify(courses));
    }

    renderCourses();
</script>

</body>
</html>
