<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Уроки</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#00e5ff">
    <link rel="icon" href="./icons/gamestudy-icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./icons/gamestudy-icon.svg">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo" onclick="window.location.href='index.html'">GameStudy</div>

    <button class="burger-menu" type="button" aria-label="Open menu" aria-expanded="false" onclick="toggleBurgerMenu()">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <div class="nav-buttons">
        <button onclick="window.location.href='lessons.html'">Уроки</button>
        <button onclick="window.location.href='test.html'">Тести</button>
        <button onclick="window.location.href='profile.html'">Профіль</button>
        <button onclick="window.location.href='rating.html'">Рейтинг</button>
        <button onclick="window.location.href='login.html'">Вхід</button>
        <button onclick="window.location.href='register.html'">Реєстрація</button>
        <button class="admin-nav-button hidden" onclick="window.location.href='admin.html'">Адмін</button>
    </div>
</header>

<main class="lessons-page">
    <section class="lessons-hero">
        <div>
            <span class="profile-kicker">GameStudy Academy</span>
            <h1>Навчальні уроки</h1>
            <p>Оберіть гру, знайдіть потрібну тему і почніть прокачувати навички.</p>
        </div>
        <div class="lessons-hero-stat">
            <span>Lessons</span>
            <strong>9</strong>
            <p>активні напрямки</p>
        </div>
    </section>

    <section class="lesson-controls">
        <input type="search" id="lessonSearch" placeholder="Пошук уроків..." oninput="renderLessons()">
        <div class="lesson-filter">
            <button class="active" data-filter="all" onclick="setLessonFilter('all')">Усі</button>
            <button data-filter="cs2" onclick="setLessonFilter('cs2')">CS2</button>
            <button data-filter="dota2" onclick="setLessonFilter('dota2')">Dota 2</button>
            <button data-filter="valorant" onclick="setLessonFilter('valorant')">Valorant</button>
        </div>
    </section>

    <section id="lessonCards" class="lesson-cards-grid"></section>

    <section id="lessonBlock" class="lesson-detail-panel hidden">
        <div class="profile-panel-head">
            <h2 id="lessonTitle"></h2>
        </div>
        <p id="lessonText"></p>
    </section>

    <p class="test-back-link"><a href="index.html">Повернутися на головну</a></p>
</main>

<script>
    const lessons = [
        {
            type: "cs2",
            game: "CS2",
            title: "Aim, позиції та контроль віддачі",
            description: "Базовий урок для стабільної стрільби, правильного прицілу і впевнених дуелей.",
            level: "Середній",
            duration: "18 хв",
            text: "CS2 вимагає хорошої реакції, точного наведення та контролю віддачі. Для покращення aim важливо регулярно тренуватися на спеціальних картах, контролювати положення прицілу та аналізувати власні помилки. Гравець повинен правильно займати позиції, швидко реагувати на появу суперника та вміти використовувати карту для переваги в бою."
        },
        {
            type: "dota2",
            game: "Dota 2",
            title: "Фарм, ролі та контроль карти",
            description: "Розбір командної взаємодії, економіки героя, предметів і важливих об'єктів.",
            level: "Базовий",
            duration: "22 хв",
            text: "У Dota 2 важливу роль відіграють командна взаємодія, фарм, розуміння ролей та контроль карти. Гравцю потрібно знати сильні й слабкі сторони свого героя, вміти добивати крипів, купувати правильні предмети та своєчасно допомагати союзникам. Перемога залежить не лише від індивідуального рівня, а й від правильної тактики та комунікації з командою."
        },
        {
            type: "valorant",
            game: "Valorant",
            title: "Агенти, кути та командний вхід",
            description: "Тактика раунду, перевірка позицій, здібності агентів і координація команди.",
            level: "Просунутий",
            duration: "20 хв",
            text: "Valorant поєднує точну стрільбу та унікальні здібності агентів. Для успішної гри потрібно правильно перевіряти кути, займати вигідні позиції, координувати дії з командою та грамотно використовувати здібності. Важливими є комунікація, контроль карти, знання ролей агентів та вміння швидко адаптуватися до ситуації під час раунду."
        },
        {
            id: "cs2-smokes",
            type: "cs2",
            game: "CS2",
            title: "Utility: smokes, flashes та retake",
            description: "Практичний урок про гранати, вихід на точку та повернення контролю після plant.",
            level: "Просунутий",
            duration: "24 хв",
            text: "У CS2 utility вирішує раунд ще до першого контакту. Важливо знати базові smoke, flash і molotov для виходу на точку, а також домовлятися з командою про таймінги. Для retake спершу збирайте інформацію, відрізайте позиції суперника гранатами і заходьте разом."
        },
        {
            id: "cs2-economy",
            type: "cs2",
            game: "CS2",
            title: "Економіка та buy rounds",
            description: "Як планувати закуп, eco, force-buy і не ламати економіку команди.",
            level: "Базовий",
            duration: "16 хв",
            text: "Економіка CS2 допомагає команді грати стабільно. Не купуйте окремо від команди, рахуйте гроші союзників і вирішуйте разом: eco, force-buy або full-buy."
        },
        {
            id: "dota2-wards",
            type: "dota2",
            game: "Dota 2",
            title: "Vision, wards та контроль карти",
            description: "Урок про огляд, deward, smoke move і безпечний фарм.",
            level: "Середній",
            duration: "19 хв",
            text: "Vision у Dota 2 відкриває карту і дозволяє приймати кращі рішення. Ставте wards під цілі команди: Roshan, tower push або захист carry. Deward позбавляє суперника інформації."
        },
        {
            id: "dota2-teamfight",
            type: "dota2",
            game: "Dota 2",
            title: "Teamfight та позиціонування",
            description: "Як починати бій, кого фокусити і де стояти різним ролям.",
            level: "Просунутий",
            duration: "25 хв",
            text: "У командному бою важливо розуміти свою роль. Initiator починає fight, support тримає сейви, carry заходить тоді, коли небезпечні spells уже витрачені."
        },
        {
            id: "valorant-crosshair",
            type: "valorant",
            game: "Valorant",
            title: "Crosshair placement та peeking",
            description: "Тренування прицілу на рівні голови, swing, jiggle peek і prefire.",
            level: "Базовий",
            duration: "17 хв",
            text: "У Valorant приціл має чекати суперника ще до того, як він з'явиться. Тримайте crosshair на рівні голови, перевіряйте кути короткими peeks і використовуйте prefire обережно."
        },
        {
            id: "valorant-postplant",
            type: "valorant",
            game: "Valorant",
            title: "Post-plant та retake",
            description: "Як грати після встановлення spike і як правильно повертати site.",
            level: "Середній",
            duration: "21 хв",
            text: "Після plant займіть crossfire, контролюйте defuse і грайте від часу. У retake дочекайтеся команди, використайте utility для очищення кутів і заходьте синхронно."
        }
    ];
    let currentLessonFilter = "all";

    function setLessonFilter(type) {
        currentLessonFilter = type;
        document.querySelectorAll(".lesson-filter button").forEach(button => {
            button.classList.toggle("active", button.dataset.filter === type);
        });
        renderLessons();
    }

    function renderLessons() {
        const query = document.getElementById("lessonSearch").value.toLowerCase().trim();
        const filteredLessons = lessons.filter(lesson => {
            const matchesGame = currentLessonFilter === "all" || lesson.type === currentLessonFilter;
            const searchableText = `${lesson.game} ${lesson.title} ${lesson.description} ${lesson.level}`.toLowerCase();
            return matchesGame && searchableText.includes(query);
        });

        document.getElementById("lessonCards").innerHTML = filteredLessons.length ? filteredLessons.map(lesson => `
            <article class="lesson-game-card ${lesson.type}-lesson">
                <span class="lesson-game">${lesson.game}</span>
                <h2>${lesson.title}</h2>
                <p>${lesson.description}</p>
                <div class="lesson-meta">
                    <span>${lesson.level}</span>
                    <span>${lesson.duration}</span>
                </div>
                <button onclick="showLesson('${lesson.id || lesson.type}')">Почати урок</button>
            </article>
        `).join("") : "<p class='muted-text empty-leaderboard'>Уроків за вашим запитом не знайдено</p>";
    }

    function showLesson(type) {
        const lesson = lessons.find(item => item.id === type || item.type === type);
        if (!lesson) return;

        document.getElementById("lessonTitle").innerText = `Урок: ${lesson.game}`;
        document.getElementById("lessonText").innerText = lesson.text;
        document.getElementById("lessonBlock").classList.remove("hidden");
        markLessonCompleted(lesson.id || lesson.type);
    }

    function markLessonCompleted(type) {
        let currentUser = JSON.parse(localStorage.getItem("currentUser"));
        if (!currentUser) return;

        currentUser.completedLessons = currentUser.completedLessons || [];
        if (!currentUser.completedLessons.includes(type)) {
            currentUser.completedLessons.push(type);
        }

        let users = JSON.parse(localStorage.getItem("users")) || [];
        let userIndex = users.findIndex(user => user.login === currentUser.login);

        if (userIndex !== -1) {
            users[userIndex] = currentUser;
            localStorage.setItem("users", JSON.stringify(users));
        }

        localStorage.setItem("currentUser", JSON.stringify(currentUser));
    }

    renderLessons();
</script>
<script src="./script.js"></script>

</body>
</html>
