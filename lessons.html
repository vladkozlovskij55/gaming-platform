<main class="lessons-page wiki-page">

        </div>

    <section class="wiki-nav" aria-label="Навігація по матеріалах">

        <a href="#lol">League of Legends</a>

                { role: "Support", text: "предмети для контролю та захисту: Locket, Redemption, Mikael's Blessing, Control Wards." },
                { role: "Mid", text: "предмети для магічної шкоди: Luden, Liandry, Zhonya, Rabadon's Deathcap." },
                { role: "Jungle", text: "предмети для ганків та контролю об'єктів: jungle item, boots, damage або tank-ядро під чемпіона." },

    function renderList(items) {
        return `<ul>${items.map(item => `<li>${item}</li>`).join("")}</ul>`;
    }

    function renderGuide(game) {
        if (!game.guide) return "";

        return `
            <div class="wiki-info-block wiki-guide">
                <h3>${game.guideTitle}</h3>
                <div class="wiki-guide-grid">
                    ${game.guide.map(item => `
                        <article>
                            <strong>${item.role}</strong>
                            <p>${item.text}</p>
                        </article>
                    `).join("")}
                </div>
            </div>
        `;
    }

    function renderWiki() {
        document.getElementById("wikiSections").innerHTML = wikiGames.map(game => `
            <article class="wiki-game-section ${game.id}-lesson" id="${game.id}">
                <div class="wiki-game-card">
                    <div class="wiki-game-media">
                        <img src="${game.image}" alt="${game.name}">
                    </div>
                    <div class="wiki-game-intro">
                        <span class="lesson-game">${game.name}</span>
                        <h2>${game.cardTitle}</h2>
                        <p>${game.description}</p>
                        <div class="wiki-actions">
                            <button onclick="markLessonCompleted('${game.id}-wiki')">Позначити прочитаним</button>
                            <button class="secondary-btn" onclick="goToTest('${game.testType}')">Пройти тест</button>
                        </div>
                    </div>
                </div>

                <div class="wiki-content-grid">
                    <div class="wiki-info-block">
                        <h3>Основи для новачка</h3>
                        ${renderList(game.basics)}
                    </div>
                    <div class="wiki-info-block">
                        <h3>Типові помилки</h3>
                        ${renderList(game.mistakes)}
                    </div>
                    <div class="wiki-info-block">
                        <h3>Поради</h3>
                        ${renderList(game.tips)}
                    </div>
                    <div class="wiki-info-block wiki-video">
                        <h3>Відео-матеріал</h3>
                        <p>Добірка відео для швидкого старту і закріплення теми.</p>
                        <a href="${game.videoUrl}" target="_blank" rel="noopener">Відкрити відео</a>
                    </div>
                </div>

                ${renderGuide(game)}
            </article>
        `).join("");
    }

    function markLessonCompleted(type) {
        let currentUser = JSON.parse(localStorage.getItem("currentUser"));
        if (!currentUser) {
            alert("Увійдіть в акаунт, щоб зберегти прогрес.");
            return;
        }

        currentUser.completedLessons = currentUser.completedLessons || [];
        if (!currentUser.completedLessons.includes(type)) {
            currentUser.completedLessons.push(type);
        }

        let users = JSON.parse(localStorage.getItem("users")) || [];
        let userIndex = users.findIndex(user => user.login === currentUser.login);

        if (userIndex !== -1) {
            users[userIndex] = currentUser;
            localStorage.setItem("users", JSON.stringify(users));
        }

        localStorage.setItem("currentUser", JSON.stringify(currentUser));
        alert("Матеріал збережено у прогресі профілю.");
    }

    function goToTest(type) {
        localStorage.setItem("selectedTestGame", type);
        window.location.href = `test.html#${type}`;
    }

    renderWiki();
</script>
<script src="./script.js"></script>

</body>
</html>
