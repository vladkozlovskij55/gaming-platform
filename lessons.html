            description: "Дракони, Herald, Baron, vision і правильні ротації після лінійної стадії.",
            level: "Просунутий",
            duration: "26 хв",
            text: "Макро-гра у League of Legends - це рішення на карті. Перед драконом або Baron потрібно поставити vision, пропушити лінії та зайняти позиції раніше суперника. Команда, яка контролює об'єкти, частіше перетворює перевагу у перемогу."
        }
    ];
    let currentLessonFilter = "all";

    function setLessonFilter(type) {
        currentLessonFilter = type;
        document.querySelectorAll(".lesson-filter button").forEach(button => {
            button.classList.toggle("active", button.dataset.filter === type);
        });
        renderLessons();
    }

    function renderLessons() {
        const query = document.getElementById("lessonSearch").value.toLowerCase().trim();
        const filteredLessons = lessons.filter(lesson => {
            const matchesGame = currentLessonFilter === "all" || lesson.type === currentLessonFilter;
            const searchableText = `${lesson.game} ${lesson.title} ${lesson.description} ${lesson.level}`.toLowerCase();
            return matchesGame && searchableText.includes(query);
        });

        document.getElementById("lessonCards").innerHTML = filteredLessons.length ? filteredLessons.map(lesson => `
            <article class="lesson-game-card ${lesson.type}-lesson">
                <span class="lesson-game">${lesson.game}</span>
                <h2>${lesson.title}</h2>
                <p>${lesson.description}</p>
                <div class="lesson-meta">
                    <span>${lesson.level}</span>
                    <span>${lesson.duration}</span>
                </div>
                <button onclick="showLesson('${lesson.id || lesson.type}')">РџРѕС‡Р°С‚Рё СѓСЂРѕРє</button>
            </article>
        `).join("") : "<p class='muted-text empty-leaderboard'>РЈСЂРѕРєС–РІ Р·Р° РІР°С€РёРј Р·Р°РїРёС‚РѕРј РЅРµ Р·РЅР°Р№РґРµРЅРѕ</p>";
    }

    function showLesson(type) {
        const lesson = lessons.find(item => item.id === type || item.type === type);
        if (!lesson) return;

        document.getElementById("lessonTitle").innerText = `РЈСЂРѕРє: ${lesson.game}`;
        document.getElementById("lessonText").innerText = lesson.text;
        document.getElementById("lessonBlock").classList.remove("hidden");
        markLessonCompleted(lesson.id || lesson.type);
    }

    function markLessonCompleted(type) {
        let currentUser = JSON.parse(localStorage.getItem("currentUser"));
        if (!currentUser) return;

        currentUser.completedLessons = currentUser.completedLessons || [];
        if (!currentUser.completedLessons.includes(type)) {
            currentUser.completedLessons.push(type);
        }

        let users = JSON.parse(localStorage.getItem("users")) || [];
        let userIndex = users.findIndex(user => user.login === currentUser.login);

        if (userIndex !== -1) {
            users[userIndex] = currentUser;
            localStorage.setItem("users", JSON.stringify(users));
        }

        localStorage.setItem("currentUser", JSON.stringify(currentUser));
    }

    renderLessons();
</script>
<script src="./script.js"></script>

</body>
</html>
